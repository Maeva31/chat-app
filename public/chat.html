<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Modal d'information utilisateur -->
  <div id="myModal" class="modal">
    <!-- Modal inchangé -->
  </div>

  <!-- Wrapper principal -->
  <main>
    <!-- Sidebar gauche : salons -->
    <aside id="channel-sidebar">
      <header>
        <h3>Salons</h3>
      </header>

      <div id="create-channel">
        <input type="text" id="new-channel-name" placeholder="Nouveau salon..." maxlength="20" />
        <button id="create-channel-button">Créer</button>
      </div>

      <ul id="channel-list">
        <li class="channel selected"># Général</li>
        <li class="channel"># Musique</li>
        <li class="channel"># Gaming</li>
        <li class="channel"># Détente</li>
      </ul>
    </aside>

    <!-- Zone centrale : chat -->
    <section id="chat-container">
      <div id="chat-messages" class="chat-messages"></div>
      <div id="chat-input">
        <input id="message-input" type="text" placeholder="Votre message..." maxlength="300" />
      </div>
    </section>

    <!-- Sidebar droite : utilisateurs -->
    <aside id="user-list">
      <h3 style="text-align: center;">Liste du salon</h3>
      <ul id="users"></ul>
    </aside>
  </main>

  <button onclick="createRoom()">Créer un salon</button>
  <input type="text" id="newRoomName" placeholder="Nom du salon">
  
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Fonction pour créer un salon
    function createRoom() {
      const newRoomName = document.getElementById('newRoomName').value;
      if (newRoomName) {
        socket.emit('createRoom', newRoomName); // Émettre l'événement de création de salon
      } else {
        alert('Veuillez entrer un nom de salon');
      }
    }

    // Gérer l'événement de création de salon
    socket.on('room created', (newRoom) => {
      alert(`Le salon "${newRoom}" a été créé avec succès.`);
      const newChannelListItem = document.createElement('li');
      newChannelListItem.classList.add('channel');
      newChannelListItem.textContent = `# ${newRoom}`;
      document.getElementById('channel-list').appendChild(newChannelListItem);
    });

    // Gérer l'événement de salon existant
    socket.on('room exists', (roomName) => {
      alert(`Le salon "${roomName}" existe déjà.`);
    });

    // Gérer les messages de chat
    socket.on('chat message', (msg) => {
      const chatMessages = document.getElementById('chat-messages');
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.textContent = `${msg.username}: ${msg.message}`;
      chatMessages.appendChild(messageDiv);
    });
  </script>
  
  <script src="app.js"></script>
</body>
</html>
