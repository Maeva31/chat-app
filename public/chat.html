<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Modal d'information utilisateur -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <h2>Bienvenue !</h2>
      <p>Veuillez entrer vos informations pour accéder au chat.</p>

      <input id="username-input" type="text" placeholder="Pseudo (max 16 caractères)" maxlength="16" />

      <select id="gender-select">
        <option value="">Genre</option>
        <option value="Homme">Homme</option>
        <option value="Femme">Femme</option>
        <option value="Autre">Autre</option>
      </select>

      <input id="age-input" type="number" placeholder="Âge (18-89)" min="18" max="89" />

      <div id="modal-error" class="modal-error" style="display: none;"></div>

      <button id="username-submit">Valider</button>
    </div>
  </div>

  <!-- Wrapper principal -->
  <main>
    <!-- Sidebar gauche : salons -->
    <aside id="channel-sidebar">
      <header>
        <h3>Salons</h3>
      </header>

      <div id="create-channel">
        <input type="text" id="new-channel-name" placeholder="Nouveau salon..." maxlength="20" />
        <button id="create-channel-button">Créer</button>
      </div>

      <ul id="channel-list">
        <li class="channel selected"># Général</li>
        <li class="channel"># Musique</li>
        <li class="channel"># Gaming</li>
        <li class="channel"># Détente</li>
      </ul>
    </aside>

    <!-- Zone centrale : chat -->
    <section id="chat-container">
      <div id="chat-messages" class="chat-messages"></div>
      <div id="chat-input">
        <input id="message-input" type="text" placeholder="Votre message..." maxlength="300" />
      </div>
    </section>

    <!-- Sidebar droite : utilisateurs -->
    <aside id="user-list">
      <h3 style="text-align: center;">Liste du salon</h3>
      <ul id="users"></ul>
    </aside>
  </main>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>

  <script>
    // Création d'un salon dynamique
    const createChannelButton = document.getElementById("create-channel-button");
    createChannelButton.addEventListener("click", function () {
      const newChannelName = document.getElementById("new-channel-name").value.trim();
      if (newChannelName && newChannelName.length <= 20) {
        socket.emit('create channel', newChannelName); // Envoi de la requête au backend pour créer le salon
        document.getElementById("new-channel-name").value = ''; // Réinitialiser le champ
      }
    });

    // Rejoindre un salon au clic
    const channelList = document.getElementById("channel-list");
    channelList.addEventListener("click", function (e) {
      if (e.target.classList.contains("channel")) {
        // Clic sur un salon, on le sélectionne et rejoint
        const selectedChannel = e.target.textContent.trim();
        socket.emit('join room', selectedChannel); // Envoi au backend
        document.querySelectorAll('.channel').forEach(item => item.classList.remove('selected'));
        e.target.classList.add('selected');
        document.getElementById("message-input").focus();
      }
    });
  </script>
</body>
</html>
