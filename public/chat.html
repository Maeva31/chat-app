<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Modal d'information utilisateur -->
  <div id="myModal" class="modal">
    <!-- (inchangé) -->
  </div>

  <!-- Nouveau wrapper principal -->
 <main>
  <!-- Sidebar gauche : salons -->
  <aside id="channel-sidebar">
    <h3>Salons</h3>
    <ul id="channel-list">
      <li class="channel selected"># Général</li>
      <li class="channel"># Musique</li>
      <li class="channel"># Gaming</li>
      <li class="channel"># Détente</li>
    </ul>
  </aside>

  <!-- Zone centrale : chat -->
  <section id="chat-container">
    <div id="chat-messages" class="chat-messages"></div>
    <div id="chat-input">
      <input id="message-input" type="text" placeholder="Votre message..." maxlength="300" />
    </div>
  </section>

  <!-- Sidebar droite : utilisateurs -->
  <aside id="user-list">
    <center><h3>Liste du salon</h3></center>
    <ul id="users"></ul>
  </aside>
</main>


  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>

</html>
